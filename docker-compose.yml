version: "3.8"

services:
  redis:
    image: redis:alpine
    container_name: redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    container_name: backend
    env_file:
      - ./backend/.env  # ✅ Ensure this path is correct
    environment:
      - REDIS_URL=redis://redis:6379  # ✅ Explicitly setting the variable
    depends_on:
      - redis
    ports:
      - "5000:5000"
