version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: redis
    restart: always
    ports:
      - '6379:6379'

  mongo:
    image: mongo:latest #
    command: ['--replSet', 'rs0', '--bind_ip_all'] #
    container_name: mongo
    restart: always
    ports:
      - '27018:27017' #
    volumes:
      - mongo_data:/data/db #

  backend:
    build:
      context: ./backend #
      dockerfile: dockerfile #
    container_name: backend
    env_file:
      - ./backend/.env #
    environment:
      - REDIS_URL=redis://redis:6379 #
      - MONGO_URL=mongodb://mongo:27017 #
      - MONGO_URI=mongodb://mongo:27017/test?replicaSet=rs0 #
      - NODE_ENV=development #
      - TIMEZONE=Asia/Jerusalem #
    volumes:
      - ./backend:/app #
      # Using a named volume for node_modules consistency
      - backend_node_modules:/app/node_modules
    # Standard node command as requested
    command: node server.js #
    depends_on:
      - redis
      - mongo
    ports:
      - '5000:5000' #

  frontend:
    build:
      context: ./frontend #
      dockerfile: Dockerfile.dev #
    container_name: frontend
    ports:
      - '3000:3000' #
    volumes:
      - ./frontend:/app #
      - frontend_node_modules:/app/node_modules #
    depends_on:
      - backend

volumes:
  mongo_data:
    name: labbooker_mongo_data #
  frontend_node_modules: #
  backend_node_modules: #