# ============================================================
# docker-compose.prod.yml — Production environment
# ============================================================
# Usage: docker compose -f docker-compose.prod.yml up -d
#
# Required: Create a .env file in the project root with:
#   REDIS_PASSWORD,
#   ROOT_EMAIL, ROOT_PASSWORD,
#   PRIMARY_APPROVAL_MANAGER, SECONDARY_APPROVAL_MANAGER,
#   SENDGRID_API_KEY, SENDGRID_FROM_EMAIL
#
# Note: MongoDB is expected to be an external managed service
# (e.g. MongoDB Atlas). Set MONGO_URI in backend/.env.
# ============================================================

services:
  redis:
    image: redis:alpine
    container_name: labbooker-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    # No port exposed to host in production
    networks:
      - labbooker-net

  backend:
    build:
      context: ./backend
      dockerfile: dockerfile
    container_name: labbooker-backend
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - TIMEZONE=Asia/Jerusalem
      - ROOT_EMAIL=${ROOT_EMAIL}
      - ROOT_PASSWORD=${ROOT_PASSWORD}
      - PRIMARY_APPROVAL_MANAGER=${PRIMARY_APPROVAL_MANAGER}
      - SECONDARY_APPROVAL_MANAGER=${SECONDARY_APPROVAL_MANAGER}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - SENDGRID_FROM_EMAIL=${SENDGRID_FROM_EMAIL}
    command: node server.js
    # No port exposed — nginx reverse-proxies to backend
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    networks:
      - labbooker-net

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: labbooker-nginx
    ports:
      - '80:80'
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    networks:
      - labbooker-net

networks:
  labbooker-net:
    driver: bridge
