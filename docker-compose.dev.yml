# ============================================================
# docker-compose.dev.yml — Development environment
# ============================================================
# Usage: docker compose -f docker-compose.dev.yml up
# ============================================================

services:
  redis:
    image: redis:alpine
    container_name: labbooker-redis
    restart: always
    # Exposed for local debugging (RedisInsight, etc.)
    ports:
      - '6379:6379'
    networks:
      - labbooker-net

  mongo:
    image: mongo:latest
    container_name: labbooker-mongo
    restart: always
    command: ['--replSet', 'rs0', '--bind_ip_all']
    # Exposed for local debugging (Compass, mongosh, etc.)
    ports:
      - '27018:27017'
    volumes:
      - mongo_data:/data/db
    networks:
      - labbooker-net

  mongo-init:
    image: mongo:latest
    container_name: labbooker-mongo-init
    restart: 'no'
    depends_on:
      - mongo
    entrypoint: >
      mongosh --host mongo:27017 --eval "
        try {
          rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'mongo:27017' }] });
          print('Replica set initiated');
        } catch(e) {
          if (e.codeName === 'AlreadyInitialized') {
            print('Replica set already initialized');
          } else {
            throw e;
          }
        }
      "
    networks:
      - labbooker-net

  backend:
    build:
      context: ./backend
      dockerfile: dockerfile
    container_name: labbooker-backend
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=development
      - REDIS_URL=redis://redis:6379
      - MONGO_URL=mongodb://mongo:27017
      - MONGO_URI=mongodb://mongo:27017/labbooker?replicaSet=rs0
      - TIMEZONE=Asia/Jerusalem
    # Hot reload: mount source code + use nodemon
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    command: npx nodemon --legacy-watch server.js
    ports:
      - '5000:5000'
    depends_on:
      - redis
      - mongo
    networks:
      - labbooker-net

  frontend:
    build:
      context: ./frontend
      dockerfile: dockerfile
    container_name: labbooker-frontend
    environment:
      - WATCHPACK_POLLING=true
      - WDS_SOCKET_PORT=3000
    # Hot reload: mount source code
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - '3000:3000'
    depends_on:
      - backend
    networks:
      - labbooker-net

volumes:
  mongo_data:
    name: labbooker_mongo_data
  frontend_node_modules:
  backend_node_modules:

networks:
  labbooker-net:
    driver: bridge
