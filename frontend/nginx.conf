server {
    listen 80;
    server_name localhost;

    # The directory where the React build output is located
    root /usr/share/nginx/html;
    index index.html;

    # Main location block
    location / {
        # Critical for Single Page Applications (SPA) like React.
        # It tries to find the file ($uri), then the directory ($uri/).
        # If neither exists, it serves index.html to let React Router handle the route.
        try_files $uri $uri/ /index.html;

        # Security Headers
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
        add_header Referrer-Policy "strict-origin-when-cross-origin";
    }

    # Caching for static assets (images, fonts, JS, CSS)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Error handling
    # Redirect 404 errors to index.html so React can handle "Not Found" pages
    error_page 404 /index.html;

    # Standard 50x error page
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}